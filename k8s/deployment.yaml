apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: store-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: order-service:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_PATH
              value: /data/orders.db
            - name: CATALOG_SERVICE_URL
              value: http://catalog-service:8000
          volumeMounts:
            - name: order-data
              mountPath: /data
      volumes:
        - name: order-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: store-app
spec:
  type: NodePort
  selector:
    app: order-service
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30082
